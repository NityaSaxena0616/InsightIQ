{% extends 'layouts/base.html' %}

{% block content %}

<h2>Upload Sales Data</h2>

<div class="card upload-card">
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        
        <div style="margin-bottom: 20px;">
            {{ form.as_p }}
        </div>

        <button type="submit">Upload and analyze</button>
    </form>
</div>

{% endblock %}
